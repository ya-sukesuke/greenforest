<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>マッチングサイト</title>
<link rel="stylesheet" href="style.css">
</head>

	
<div class="bg_pattern Polka_v2"></div>

<body>
<header class="site-header">
    <h1>犬猫マッチング</h1>
    <div class="controls">
    </div>
</header>


<div class="itprof">
    <h2>プロフィール</h2>
    <div class="image-upload-section">
        <input type="file" id="imgInput" accept="image/*">
        <div class="img-preview-wrapper">
        <img id="imgPreview" class="img-preview hidden" />
        </div>
    </div>

    
    <div class="pulldown-wrapper">
        <label class="selectbox-2">
            <select>
                <option>猫</option>
                <option>犬</option>
            </select>
            <select>
                <option>オス</option>
                <option>メス</option>
            </select>
        </label>
        
    </div>
    <input id="Name" placeholder="名前を入力"></input>
    <input id="Breed" placeholder="品種を入力"></input>
    <input id ="Age" placeholder="年齢を入力"></input>
    <input id="birthday" placeholder="誕生日を入力"></input>
    <textarea id="meBio" placeholder="紹介文"></textarea>
    <button id="saveProfile">保存</button>
</div>
<script src="app.js"></script>
</body>
</html>
