<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>犬猫マッチング - 登録</title>

  <!-- 共通CSS -->
  <link rel="stylesheet" href="header_style.css">
  <link rel="stylesheet" href="display.css">
  <link rel="stylesheet" href="plf_style.css">
</head>

<body>
  <div class="bg_pattern Polka_v2"></div>

  <!-- ヘッダー -->
  <div id="header-placeholder"></div>

  <!-- プロフィール登録 -->
  <div class="itprof">
    <h2>プロフィール登録</h2>

    <!-- 画像アップロード -->
    <div class="image-upload-section">
      <input type="file" id="imgInput" accept="image/*">
      <div class="img-preview-wrapper">
        <img id="imgPreview" class="img-preview hidden">
      </div>
    </div>

    <!-- 基本情報 -->
    <input type="text" id="Name" placeholder="名前を入力">
    <input type="text" id="Breed" placeholder="品種を入力">

    <!-- 種別 -->
    <div class="type-group">
      <label class="type-option">
        <input type="radio" name="type" value="dog" checked>
        <span>犬</span>
      </label>

      <label class="type-option">
        <input type="radio" name="type" value="cat">
        <span>猫</span>
      </label>
    </div>

    <!-- 性別 -->
    <div class="gender-group">
      <label class="gender-option">
        <input type="radio" name="gender" value="male" checked>
        <span>男の子</span>
      </label>

      <label class="gender-option">
        <input type="radio" name="gender" value="female">
        <span>女の子</span>
      </label>
    </div>

    <!-- 避妊・去勢 -->
    <div class="sterilization-group">
    <p class="sterilization-title">避妊・去勢手術</p>

    <label class="sterilization-option">
        <input type="radio" name="sterilization" value="not_done" checked>
        <span>未</span>
    </label>

    <label class="sterilization-option">
        <input type="radio" name="sterilization" value="done">
        <span>済</span>
    </label>
    </div>

    <!-- 病歴 -->
    <div class="disease-group">
      <p class="disease-title">病歴</p>

      <div class="disease-row">
        <label>エイズ</label>
        <select id="disease_fiv">
          <option value="none">なし</option>
          <option value="treated">治療済み</option>
          <option value="ongoing">闘病中</option>
        </select>
      </div>

      <div class="disease-row">
        <label>白血病</label>
        <select id="disease_felv">
          <option value="none">なし</option>
          <option value="treated">治療済み</option>
          <option value="ongoing">闘病中</option>
        </select>
      </div>

      <div id="otherDiseaseContainer">
        <div class="disease-row other-disease-row">
          <input type="text" class="other-disease-input" placeholder="その他の病名">
          <select class="other-disease-status">
            <option value="none">なし</option>
            <option value="treated">治療済み</option>
            <option value="ongoing">闘病中</option>
          </select>
        </div>
      </div>

      <button id="addOtherDisease" type="button">その他を追加</button>
    </div>

    <!-- 推定年齢 -->
    <label class="form-title">推定年齢</label>

    <div class="age-group">
      <select id="ageSelect">
        <!-- JSで 0〜30 を生成 -->
      </select>
      <span class="age-unit">歳</span>

      <select id="monthSelect">
        <!-- JSで 0〜12 を生成 -->
      </select>
      <span class="age-unit">ヵ月</span>
    </div>

    <!-- 日付 -->
    <label for="birthday" class="note form-title">推定誕生日</label>
    <input type="date" id="birthday">

    <label for="ProtectDay" class="note form-title">保護日</label>
    <input type="date" id="ProtectDay">

    <!-- 緊張度 -->
    <div class="tension-group">
      <label for="tensionRange" class="tension-title form-title">
        緊張の度合い：<span id="tensionValue">3</span>
      </label>

      <input
        type="range"
        id="tensionRange"
        min="1"
        max="5"
        step="1"
        value="3"
      >
    <div class="tension-scale">
    <div class="tension-label">
        <span class="tension-num">1</span>
        <span class="tension-text">パンチ・噛む</span>
    </div>

    <div class="tension-label">
        <span class="tension-num">5</span>
        <span class="tension-text">フレンドリー</span>
    </div>
    </div>
    </div>

    <!-- 紹介文 -->
    <textarea id="meBio" placeholder="紹介文を入力してください"></textarea>

    <!-- 保存 -->
    <button id="saveProfile">保存</button>
  </div>

  <!-- ヘッダー読み込み -->
  <script>
    fetch("header.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("header-placeholder").innerHTML = html;
      });
  </script>

  <script src="/plf_app.js" defer></script>
</body>
</html>
