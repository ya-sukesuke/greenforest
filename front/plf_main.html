<!DOCTYPE html>
<html lang="ja">
<head>

    <!--ヘッダーを読み込む-->

  <link rel="stylesheet" href="header_style.css">
  <link rel="stylesheet" href="display.css">

    <!--ヘッダーを読み込む-->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>犬猫マッチング - 登録</title>
    <link rel="stylesheet" href="header_style.css">
    <link rel="stylesheet" href="plf_style.css">
</head>
<body>
    <div class="bg_pattern Polka_v2"></div>
    <div id="header-placeholder"></div>

    <div class="itprof">
        <h2>プロフィール登録</h2>
        
        <div class="image-upload-section">
            <input type="file" id="imgInput" accept="image/*">
            <div class="img-preview-wrapper">
                <img id="imgPreview" class="img-preview hidden" />
            </div>
        </div>

        <input id="Name" placeholder="名前を入力">
        <input id="Breed" placeholder="品種を入力">

        <div class="pulldown-wrapper">
            <label class="selectbox-2">
                <div class="type-group">
                    <label class="type-option">
                        <input type="radio" name="type" value="dog" checked>
                        <span>犬</span>
                    </label>

                    <label class="type-option">
                        <input type="radio" name="type" value="cat">
                        <span>猫</span>
                    </label>
                </div>

                <div class="gender-group">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male" checked>
                        <span>男の子</span>
                    </label>

                    <label class="gender-option">
                        <input type="radio" name="gender" value="female">
                        <span>女の子</span>
                    </label>
                </div>

                <div class="disease-group">
                <p class="disease-title">病歴</p>

                <!-- 1行目 -->
                <div class="disease-row">
                    <label class="disease-option">
                    <input type="checkbox" value="fiv">
                    <span>エイズ</span>
                    </label>

                    <label class="disease-option">
                    <input type="checkbox" value="felv">
                    <span>白血病</span>
                    </label>
                </div>

                <!-- 2行目 -->
                <div class="disease-row">
                    <label class="disease-option">
                    <input type="checkbox" id="diseaseOther" value="other">
                    <span>その他</span>
                    </label>

                    <input
                    type="text"
                    id="otherDiseaseInput"
                    placeholder="病名を入力"
                    class="other-disease-input"
                    />
                </div>


            </div>
        </div>


        
        <label class="note">誕生日</label> 
        <input type="date" id="birthday"><br>
        
        <label class="note">保護日</label> 
        <input type="date" id="ProtectDay">

        <div class="tension-group">
        <label for="tensionRange" class="tension-title">
            緊張の度合い：<span id="tensionValue">3</span>
        </label>

        <input
            type="range"
            id="tensionRange"
            min="1"
            max="5"
            step="1"
            value="3"
        />

        <div class="tension-scale">
            <span>1</span>
            <span>5</span>
        </div>
        </div>

        
        <textarea id="meBio" placeholder="紹介文を入力してください"></textarea>
        
        <button id="saveProfile">保存</button>
    </div>

<script>
  fetch("header.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("header-placeholder").innerHTML = html;
    });

    
</script>

    <script src="/plf_app.js" defer></script>
</body>
</html>
