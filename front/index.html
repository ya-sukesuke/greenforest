<!DOCTYPE html>
<html>
<head>

    <!--ヘッダーを読み込む-->

  <link rel="stylesheet" href="header_style.css">
  <link rel="stylesheet" href="display.css">

    <!--ヘッダーを読み込む-->

  <style>
    .text-1{
        position: absolute;  
        top: 50%;             
        left: 50%;          
        transform: translate(-50%, -50%); 
        font-size: 24px;
        color: black;
    }
  </style>

</head>


<body>
    <header>
      <div id="header"></div>
    </header>
    <main>
      <div id="main"></div>
    </main>
    <footer>
      <div id="footer"></div>
    </footer>

    <script>
      fetch("header.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("header").innerHTML = html;
        })
      
      fetch("footer.html")
        .then(res => res.text())
        .then(html => {
          document.getElementById("footer").innerHTML = html;
        })
    </script>
    <script src="/plf_app.js" defer></script>
</body>

</html>
