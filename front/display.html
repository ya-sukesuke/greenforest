<!DOCTYPE html>
<html lang="ja">
<head>

    <!--ヘッダーを読み込む-->

  <link rel="stylesheet" href="header_style.css">

    <!--ヘッダーを読み込む-->

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>マッチングサイト</title>
    <link rel="stylesheet" href="display.css">
</head>
<body>

    <!--ヘッダーを読み込む-->

    <div id="header-placeholder"></div>
    <script>
        fetch('header.html')
        .then(response => response.text())
        .then(data => {
            document.getElementById('header-placeholder').innerHTML = data;
        });
    </script>

    <!--ヘッダーを読み込む-->
    
    <h1></h1>
    <div class="wrap">
        <div style="text-align:center;">
            <div class="viewer" id="viewer"></div>
            <button class="saveBtn" id="saveBtn">お気に入り</button>
            <div class="controls" style="position:relative; margin-top:88px;">
                <button class="btn" id="prevBtn">前へ</button>
                <button class="btn" id="flipBtn">裏返す</button>
                <button class="btn" id="nextBtn">次へ</button>
            </div>
            
            <div class="footer-note">
                カードをクリック / タップで裏返します。<br>
                左右のボタン・スワイプでもめくれます。
            </div>
        </div>
    </div>

    <script src="display.js"></script>
</body>
</html>
