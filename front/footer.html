<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>緑の森動物病院</title>

  <style>
    body {
      margin: 0;
      font-family: "Yu Gothic", sans-serif;
      padding-bottom: 180px;
      background-color: #f7f7f7;
    }

    footer {
      background-color: #e6f7ee;
      color: #2d4d33;
      width: 100%;
      position: fixed;
      bottom: 0;
      padding: 20px 0 10px;
      border-top: 4px solid #a8d9bf;
      text-align: center;
      font-size: 18px;
      line-height: 1.6;

      /* 最初は隠す */
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    footer a {
      color: #2d4d33;
      font-weight: bold;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 8px;
    }

    .dog, .cat {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .dog {
      border-radius: 50%;
      background: #8b5a2b;
    }

    .dog::before, .dog::after {
      content: "";
      width: 18px;
      height: 18px;
      background: #8b5a2b;
      position: absolute;
      top: -6px;
      border-radius: 50%;
    }

    .dog::before { left: -2px; }
    .dog::after  { right: -2px; }

    .cat {
      background: #555;
      clip-path: polygon(20% 0%, 40% 20%, 60% 20%, 80% 0%, 100% 40%, 100% 100%, 0% 100%, 0% 40%);
    }

    .copyright {
      margin-top: 8px;
      font-size: 14px;
      color: #4b5f4a;
    }
  </style>
</head>

<body>
  <h1>緑の森動物病院</h1>
  <p>大切な家族と、森のような安心を。</p>

  <footer>
    <div class="icons">
      <div class="dog"></div>
      <div class="cat"></div>
    </div>

    <div>
      <a href="https://midori-no-mori.jp/" target="_blank">緑の森動物病院</a> |
      <a href="https://midori-no-mori.jp/faq" target="_blank">お問い合わせ</a> |
      <a href="https://midori-no-mori.jp/" target="_blank">診療案内</a>
    </div>

    <div class="copyright">
      🐾 © 2025 緑の森動物病院 🐾
    </div>
  </footer>

  <script>
    const footer = document.querySelector("footer");

    // スマホ判定（hoverできない＝スマホ扱い）
    const isMobile = window.matchMedia("(hover: none)").matches;

    if (isMobile) {
      let lastScrollY = window.scrollY;

      window.addEventListener("scroll", () => {
        if (window.scrollY < lastScrollY) {
          footer.style.transform = "translateY(0)";
        } else {
          footer.style.transform = "translateY(100%)";
        }
        lastScrollY = window.scrollY;
      });

    } else {
      window.addEventListener("mousemove", (e) => {
        const windowHeight = window.innerHeight;

        if (e.clientY > windowHeight - 120) {
          footer.style.transform = "translateY(0)";
        } else {
          footer.style.transform = "translateY(100%)";
        }
      });
    }
  </script>
</body>
</html>
